<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FluxDL Extension Settings</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: #111827;
        color: #e5e7eb;
        font-family:
          Segoe UI,
          Arial,
          sans-serif;
      }
      .card {
        max-width: 640px;
        border: 1px solid #374151;
        border-radius: 12px;
        background: #1f2937;
        padding: 16px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }
      input {
        width: 100%;
        height: 40px;
        border: 1px solid #4b5563;
        border-radius: 8px;
        background: #111827;
        color: #f9fafb;
        padding: 0 10px;
      }
      button {
        margin-top: 12px;
        border: 1px solid #374151;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .status {
        margin-top: 8px;
        color: #93c5fd;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <label for="baseUrl">FluxDL app URL</label>
      <input id="baseUrl" placeholder="http://localhost:3000" />
      <button id="save">Save</button>
      <div class="status" id="status"></div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
