<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FluxDL</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 320px;
        background: #111827;
        color: #e5e7eb;
        font-family:
          Segoe UI,
          Arial,
          sans-serif;
      }
      p {
        margin: 0 0 10px;
        font-size: 13px;
        color: #9ca3af;
      }
      button {
        width: 100%;
        border: 1px solid #374151;
        border-radius: 8px;
        background: #1f2937;
        color: #f3f4f6;
        padding: 10px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        border-color: #6b7280;
      }
      .muted {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
      }
      a {
        color: #93c5fd;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <p>Send the current tab URL to FluxDL.</p>
    <button id="sendCurrent">Send current tab to FluxDL</button>
    <p class="muted"><a href="#" id="openOptions">Settings</a></p>
    <script src="popup.js"></script>
  </body>
</html>
