<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FluxDL — Fast Media Downloader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              mono: [
                "JetBrains Mono",
                "ui-monospace",
                "SFMono-Regular",
                "monospace",
              ],
            },
            colors: {
              flux: {
                50: "#fff1f1",
                100: "#ffd7d7",
                200: "#ffb0b0",
                300: "#ff8080",
                400: "#ff4f4f",
                500: "#ff3b3b",
                600: "#e52626",
                700: "#be1b1b",
                800: "#9d1a1a",
                900: "#821c1c",
              },
            },
            boxShadow: {
              panel: "0 20px 60px rgba(0,0,0,.35)",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(
            circle at top,
            rgba(255, 59, 59, 0.14),
            transparent 32%
          ),
          radial-gradient(
            circle at 85% 15%,
            rgba(255, 255, 255, 0.05),
            transparent 22%
          ),
          linear-gradient(180deg, #090909 0%, #050505 100%);
      }

      [data-theme="light"] body {
        background:
          radial-gradient(
            circle at top,
            rgba(239, 68, 68, 0.14),
            transparent 34%
          ),
          linear-gradient(180deg, #f6f7fb 0%, #eef1f6 100%);
      }

      [data-theme="light"] .rounded-3xl,
      [data-theme="light"] .rounded-2xl,
      [data-theme="light"] .rounded-xl,
      [data-theme="light"] .rounded-lg {
        background-color: rgba(255, 255, 255, 0.9) !important;
        border-color: #d4d4d8 !important;
      }

      [data-theme="light"] [class*="bg-zinc-9"],
      [data-theme="light"] [class*="bg-zinc-8"] {
        background-color: rgba(255, 255, 255, 0.94) !important;
      }

      [data-theme="light"] .text-zinc-100,
      [data-theme="light"] .text-zinc-200,
      [data-theme="light"] .text-zinc-300,
      [data-theme="light"] .text-zinc-400,
      [data-theme="light"] .text-zinc-500 {
        color: #18181b !important;
      }

      [data-theme="light"] h1,
      [data-theme="light"] h2,
      [data-theme="light"] h3,
      [data-theme="light"] strong,
      [data-theme="light"] summary,
      [data-theme="light"] label,
      [data-theme="light"] p,
      [data-theme="light"] span,
      [data-theme="light"] a {
        color: #18181b;
      }

      [data-theme="light"] button[class*="bg-zinc"],
      [data-theme="light"] input,
      [data-theme="light"] select,
      [data-theme="light"] textarea {
        color: #18181b !important;
        background-color: rgba(255, 255, 255, 0.96) !important;
      }

      [data-theme="light"] [class*="border-zinc-"] {
        border-color: #d4d4d8 !important;
      }

      [data-theme="light"] input,
      [data-theme="light"] select,
      [data-theme="light"] textarea,
      [data-theme="light"] button {
        border-color: #d4d4d8 !important;
      }
    </style>
  </head>
  <body class="min-h-screen text-zinc-100 antialiased">
    <noscript>Please enable JavaScript to use FluxDL.</noscript>
    <div id="root"></div>
    <script type="module" src="react-app.js"></script>
  </body>
</html>
